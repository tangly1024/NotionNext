name: Build NotionNext Offline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-offline:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout 仓库
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. 安装 Node.js（升级到 24）
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 24

      # 3. 安装依赖
      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      # 4. 构建静态站点
      - name: Build and export site
        run: |
          npm run build
          npm run export

      # 5. 打包输出为 zip 文件（使用绝对路径确保可找到）
      - name: Package build
        run: |
          mkdir -p $GITHUB_WORKSPACE/dist
          zip -r $GITHUB_WORKSPACE/dist/offline.zip $GITHUB_WORKSPACE/out

      # 6. 上传构建产物（使用绝对路径）
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: offline-site
          path: $GITHUB_WORKSPACE/dist/offline.zip
