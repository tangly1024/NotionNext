name: Build Android APK

on:
  push:
    branches: ["master"] # 如果主分支是 main，请改成 main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ 下载仓库
      - name: Checkout Repository
        uses: actions/checkout@v6

      # 2️⃣ 设置 JDK 17
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # 3️⃣ 设置 Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 4️⃣ 缓存 Gradle
      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      # 5️⃣ 授权 Gradle
      - name: Grant Execute Permission
        run: chmod +x gradlew

      # 6️⃣ 构建 Debug APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # 7️⃣ 构建 Release APK (无需签名也可先生成 unsigned)
      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace

      # 8️⃣ 上传 APK Artifact
      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release-unsigned.apk

      # 9️⃣ 输出下载链接（可在 Actions 页面看到 Artifact）
      - name: Show Download Info
        run: |
          echo "✅ Debug APK: Actions -> android-apks -> app-debug.apk"
          echo "✅ Release APK: Actions -> android-apks -> app-release-unsigned.apk"
